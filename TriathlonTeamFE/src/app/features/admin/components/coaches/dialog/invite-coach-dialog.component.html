<h1 mat-dialog-title>Invita antrenor</h1>
<form [formGroup]="form" mat-dialog-content class="form">
  <mat-form-field appearance="fill">
    <mat-label>Nume</mat-label>
    <input matInput formControlName="name" required />
    <mat-error *ngIf="form.controls.name.hasError('required')">Numele este obligatoriu</mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email" required />
    <mat-error *ngIf="form.controls.email.hasError('email')">Email invalid</mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Telefon</mat-label>
    <input matInput formControlName="phone" required />
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Bio</mat-label>
    <textarea matInput formControlName="bio" rows="3"></textarea>
  </mat-form-field>

  <div class="sports">
    <span>Sporturi</span>
    <div
      class="chips"
      [class.invalid]="form.controls.sports.invalid && form.controls.sports.touched"
    >
      <mat-chip
        *ngFor="let sport of sportOptions; let i = index"
        (click)="form.controls.sports.at(i).setValue(!form.controls.sports.at(i).value)"
        [class.selected]="form.controls.sports.at(i).value"
        selectable
      >
        {{ sport }}
      </mat-chip>
    </div>
    <div class="error" *ngIf="form.controls.sports.invalid && form.controls.sports.touched">
      Selecteaza cel putin un sport
    </div>
  </div>
</form>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="isSubmitting()">Anuleaza</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="isSubmitting()">
    <mat-progress-spinner
      *ngIf="isSubmitting()"
      mode="indeterminate"
      diameter="18"
    ></mat-progress-spinner>
    <span *ngIf="!isSubmitting()">Trimite invitatie</span>
  </button>
</mat-dialog-actions>
