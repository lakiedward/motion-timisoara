<h1 mat-dialog-title>{{ data ? 'Editeaza tabara' : 'Creeaza tabara' }}</h1>
<form [formGroup]="form" mat-dialog-content class="form">
  <mat-form-field appearance="fill">
    <mat-label>Titlu</mat-label>
    <input matInput formControlName="title" required />
  </mat-form-field>

  <div class="two-columns">
    <mat-form-field appearance="fill">
      <mat-label>Data start</mat-label>
      <input matInput type="date" formControlName="startDate" required />
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Data final</mat-label>
      <input matInput type="date" formControlName="endDate" required />
    </mat-form-field>
  </div>

  <mat-form-field appearance="fill">
    <mat-label>Locatie</mat-label>
    <input matInput formControlName="location" required />
  </mat-form-field>

  <div class="two-columns">
    <mat-form-field appearance="fill">
      <mat-label>Pret</mat-label>
      <input matInput type="number" formControlName="price" required />
    </mat-form-field>
    <mat-form-field appearance="fill">
      <mat-label>Moneda</mat-label>
      <mat-select formControlName="currency" required>
        <mat-option value="RON">RON</mat-option>
        <mat-option value="EUR">EUR</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-slide-toggle formControlName="allowCash">Permite plata cash</mat-slide-toggle>

  <mat-form-field appearance="fill">
    <mat-label>Descriere</mat-label>
    <textarea matInput rows="4" formControlName="description"></textarea>
  </mat-form-field>
</form>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="isSubmitting()">Anuleaza</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="isSubmitting()">
    <mat-progress-spinner *ngIf="isSubmitting()" mode="indeterminate" diameter="18"></mat-progress-spinner>
    <span *ngIf="!isSubmitting()">Salveaza</span>
  </button>
</mat-dialog-actions>
